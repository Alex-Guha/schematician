modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Alex-Guha/Schematician/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Alex Guha"
credits="Drafting view shader pipeline derived from Create: Aeronautics / Simulated by the Creators-of-Aeronautics team."
displayURL="https://github.com/Alex-Guha/Schematician"
logoFile="logo.png"
description='''
Wear Schematician's Goggles to see the world through a Create: Aeronautics drafting-view post-process — edge-detected outlines, palette tone-mapping, and dither shading — and to see live force vectors + center of mass on any sublevel you look at. Crafted from Aviator's Goggles + a Contraption Diagram.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Veil's PostProcessingManager runs the drafting_view pipeline; nothing in the mod works without it.
[[dependencies.${mod_id}]]
    modId="veil"
    type="required"
    versionRange="[${veil_version},)"
    ordering="NONE"
    side="CLIENT"

# Create — required transitively via Aeronautics, but declared here so a missing-Create install
# fails fast with a clear message and so we can register with Create's goggles-overlay system.
[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[0,)"
    ordering="NONE"
    side="BOTH"

# Aeronautics — Schematician is built around it (the drafting-view shader is derived from
# Aeronautics' outline_diagram pipeline) and the goggles recipe consumes Aviator's Goggles.
[[dependencies.${mod_id}]]
    modId="aeronautics"
    type="required"
    versionRange="[0,)"
    ordering="NONE"
    side="BOTH"

# Simulated — provides the Physics Assembler used in the recipe; planned future integrations.
[[dependencies.${mod_id}]]
    modId="simulated"
    type="required"
    versionRange="[0,)"
    ordering="NONE"
    side="BOTH"

# Sable — physics/sublevel framework. Pulled transitively via Aeronautics already, but declared
# explicitly so the force-overlay feature fails fast on a broken install.
[[dependencies.${mod_id}]]
    modId="sable"
    type="required"
    versionRange="[0,)"
    ordering="NONE"
    side="BOTH"
