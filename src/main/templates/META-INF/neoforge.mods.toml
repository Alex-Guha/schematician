modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Alex Guha"
description='''
Adds AeroGoggles: a craftable pair of goggles that, while worn, overlays a Create: Aeronautics drafting-view post-process on the world.
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Veil's PostProcessingManager runs the drafting_view pipeline; nothing in the mod works without it.
[[dependencies.${mod_id}]]
    modId="veil"
    type="required"
    versionRange="[${veil_version},)"
    ordering="NONE"
    side="CLIENT"
